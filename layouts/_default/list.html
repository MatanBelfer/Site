{{ define "main" }}
<section class="index-section">
  <p class="eyebrow mono">{{ .Title }}</p>
  <h1>{{ with .Params.tagline }}{{ . }}{{ else }}{{ .Title }}{{ end }}</h1>
  <div class="prose">{{ .Content }}</div>

  <ul class="leaders projects">
    {{ range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ if not .Date.IsZero }}
      <span class="dots" aria-hidden="true"></span>
      <span class="mono handle">{{ .Date.Format "2006" }}</span>
      {{ end }}
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
